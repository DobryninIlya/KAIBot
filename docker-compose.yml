services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - API_TOKEN=${API_TOKEN}
      - KAI_TOKEN=${KAI_TOKEN}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    networks:
      - coolify

networks:
  coolify:
    external: true
